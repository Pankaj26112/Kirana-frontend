// ── STORAGE HELPERS ──
const load = (key, def) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } };
const save = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

// ── AD BANNER ──
function AdBanner({ads}) {
  const [idx, setIdx] = useState(0);
  useEffect(() => {
    if (ads.length < 2) return;
    const t = setInterval(() => setIdx(i => (i+1) % ads.length), 3500);
    return () => clearInterval(t);
  }, [ads.length]);
  if (!ads.length) return null;
  const ad = ads[idx % ads.length];
  return (
    <div style={{margin:"10px 16px 0", borderRadius:14, overflow:"hidden", boxShadow:"0 4px 18px rgba(0,0,0,0.18)"}}>
      <div style={{background:ad.bg, padding:"13px 16px", display:"flex", alignItems:"center", gap:12}}>
        <div style={{fontSize:34, flexShrink:0, background:"rgba(255,255,255,0.15)", borderRadius:12, width:52, height:52, display:"flex", alignItems:"center", justifyContent:"center"}}>{ad.emoji}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:9, color:"rgba(255,255,255,0.65)", letterSpacing:2, textTransform:"uppercase"}}>Sponsored</div>
          <div style={{color:"white", fontWeight:700, fontSize:14}}>{ad.business}</div>
          <div style={{color:"rgba(255,255,255,0.85)", fontSize:11}}>{ad.tagline}</div>
          <div style={{marginTop:5, background:"rgba(255,255,255,0.2)", display:"inline-block", padding:"3px 9px", borderRadius:20, color:"white", fontSize:11, fontWeight:600}}>{ad.offer}</div>
        </div>
        <a href={"tel:+91"+ad.phone} style={{background:"rgba(255,255,255,0.25)", borderRadius:10, padding:"7px 10px", color:"white", fontWeight:700, fontSize:12, textDecoration:"none", flexShrink:0}}>📞</a>
      </div>
      {ads.length > 1 && (
        <div style={{background:ad.bg, paddingBottom:8, display:"flex", justifyContent:"center", gap:5}}>
          {ads.map((_,i) => <div key={i} style={{width:i===idx%ads.length?18:6, height:6, borderRadius:3, background:i===idx%ads.length?"white":"rgba(255,255,255,0.4)", transition:"all 0.3s"}}/>)}
        </div>
      )}
    </div>
  );
}

// ── ADMIN PANEL ──
function AdminPanel({onClose}) {
  const [tab, setTab]         = useState("products"); // products | ads
  const [products, setProducts] = useState(() => load("products", DEFAULT_PRODUCTS));
  const [ads, setAds]         = useState(() => load("ads", DEFAULT_ADS));
  const [editingP, setEditingP] = useState(null); // null | {} | product
  const [editingA, setEditingA] = useState(null);
  const [toast, setToast]     = useState("");

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(""), 2500); };

  // ── Product Save ──
  const saveProduct = (p) => {
    let list;
    if (p.id) { list = products.map(x => x.id===p.id ? p : x); }
    else { list = [...products, {...p, id: Date.now()}]; }
    setProducts(list); save("products", list);
    setEditingP(null); showToast("✅ Product save ho gaya!");
  };

  const deleteProduct = (id) => {
    const list = products.filter(x => x.id !== id);
    setProducts(list); save("products", list);
    showToast("🗑️ Product delete ho gaya!");
  };

  // ── Ad Save ──
  const saveAd = (a) => {
    let list;
    if (a.id) { list = ads.map(x => x.id===a.id ? a : x); }
    else { list = [...ads, {...a, id: Date.now()}]; }
    setAds(list); save("ads", list);
    setEditingA(null); showToast("✅ Ad save ho gaya!");
  };

  const deleteAd = (id) => {
    const list = ads.filter(x => x.id !== id);
    setAds(list); save("ads", list);
    showToast("🗑️ Ad delete ho gaya!");
  };

  const inp = (val, onChange, ph, type="text") => (
    <input type={type} value={val||""} onChange={e=>onChange(e.target.value)} placeholder={ph}

            <div style={{fontSize:10, color:"#a8d87a", letterSpacing:2, textTransform:"uppercase"}}>Admin Panel</div>
            <div style={{color:"white", fontWeight:700, fontSize:17}}>{STORE_NAME}</div>
          </div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.15)", border:"none", borderRadius:10, padding:"8px 14px", color:"white", cursor:"pointer", fontWeight:700}}>✕ Band Karo</button>
        </div>

        {/* Toast */}
        {toast && <div style={{background:G.green, color:"white", textAlign:"center", padding:"10px", fontWeight:600, fontSize:13}}>{toast}</div>}

        {/* Tabs */}
        <div style={{display:"flex", background:"white", borderBottom:"2px solid #eee"}}>
          {[["products","📦 Products"],["ads","📢 Ads"]].map(([t,l]) => (
            <button key={t} onClick={()=>{setTab(t);setEditingP(null);setEditingA(null);}} style={{flex:1, padding:"13px", border:"none", background:"none", fontWeight:700, fontSize:14, cursor:"pointer", color:tab===t?G.green:"#999", borderBottom:tab===t?`3px solid ${G.green}`:"3px solid transparent"}}>{l}</button>
          ))}
        </div>

        <div style={{padding:16}}>

          {/* ── PRODUCTS TAB ── */}
          {tab==="products" && (
            <>
              {/* Product Form */}
              {editingP !== null && (
                <ProductForm p={editingP} onSave={saveProduct} onCancel={()=>setEditingP(null)} inp={inp}/>
              )}

              {/* Product List */}
              {editingP === null && (
                <>
                  <button onClick={()=>setEditingP({})} style={{width:"100%", background:G.green, color:"white", border:"none", borderRadius:12, padding:"13px", fontWeight:700, fontSize:15, cursor:"pointer", marginBottom:14}}>+ Naya Product Add Karo</button>
                  {products.map(p => (
                    <div key={p.id} style={{background:"white", borderRadius:12, padding:"12px 14px", marginBottom:8, display:"flex", alignItems:"center", gap:12, boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>

                      <div style={{flex:1}}>
                        <div style={{fontWeight:600, fontSize:13}}>{p.name}</div>

                      <button onClick={()=>setEditingP(p)} style={{background:"#e8f0fe", border:"none", borderRadius:8, padding:"6px 12px", cursor:"pointer", color:"#1967d2", fontWeight:600, fontSize:12}}>✏️ Edit</button>

                <>

                    💡 Local businesses se ₹500-1500/month charge karo in ads ke liye!

                  <button onClick={()=>setEditingA({})} style={{width:"100%", background:"#e65100", color:"white", border:"none", borderRadius:12, padding:"13px", fontWeight:700, fontSize:15, cursor:"pointer", marginBottom:14}}>+ Naya Ad Add Karo</button>
                  {ads.map(a => (
                    <div key={a.id} style={{background:a.bg||"#333", borderRadius:12, padding:"12px 14px", marginBottom:8, display:"flex", alignItems:"center", gap:12}}>
                      <div style={{fontSize:26}}>{a.emoji}</div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700, fontSize:13, color:"white"}}>{a.business}</div>
                        <div style={{fontSize:11, color:"rgba(255,255,255,0.8)"}}>{a.offer}</div>
                      </div>
                      <button onClick={()=>setEditingA(a)} style={{background:"rgba(255,255,255,0.25)", border:"none", borderRadius:8, padding:"6px 10px", cursor:"pointer", color:"white", fontWeight:600, fontSize:12}}>✏️</button>
                      <button onClick={()=>deleteAd(a.id)} style={{background:"rgba(0,0,0,0.2)", border:"none", borderRadius:8, padding:"6px 10px", cursor:"pointer", color:"white", fontWeight:600, fontSize:12}}>🗑️</button>
                    </div>
                  ))}

              )}

          )}

      </div>
    </div>

}

// ── PRODUCT FORM ──
function ProductForm({p, onSave, onCancel, inp}) {
  const [form, setForm] = useState({emoji:"🛒", cat:"atta-dal", featured:false, badge:"", ...p});
  const set = k => v => setForm(f => ({...f, [k]:v}));
  return (
    <div style={{background:"white", borderRadius:14, padding:16, marginBottom:14, boxShadow:"0 4px 20px rgba(0,0,0,0.1)"}}>
      <div style={{fontWeight:700, fontSize:16, color:G.green, marginBottom:12}}>{form.id ? "✏️ Product Edit Karo" : "➕ Naya Product"}</div>
      {inp(form.name, set("name"), "Product ka naam (e.g. Parle-G)")}
      {inp(form.price, v=>set("price")(+v), "Price (₹)", "number")}
      <select value={form.cat} onChange={e=>set("cat")(e.target.value)} style={{width:"100%", padding:"9px 12px", borderRadius:8, border:"1.5px solid #e0d5c0", fontSize:14, outline:"none", marginBottom:8, background:"white"}}>
        {CATEGORIES.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
      </select>
      <div style={{marginBottom:8}}>
        <div style={{fontSize:12, color:"#888", marginBottom:6}}>Emoji chuno:</div>
        <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
          {EMOJIS.map(e=>(
            <button key={e} onClick={()=>set("emoji")(e)} style={{width:36, height:36, borderRadius:8, border:`2px solid ${form.emoji===e?G.green:"#eee"}`, background:form.emoji===e?"#f0f7e8":"white", fontSize:20, cursor:"pointer"}}>{e}</button>
          ))}
        </div>
      </div>
      {inp(form.badge, set("badge"), "Badge (e.g. Bestseller) — optional")}
      <label style={{display:"flex", alignItems:"center", gap:8, marginBottom:12, cursor:"pointer"}}>
        <input type="checkbox" checked={!!form.featured} onChange={e=>set("featured")(e.target.checked)} style={{width:18, height:18}}/>
        <span style={{fontSize:14, color:"#333"}}>⭐ Popular/Featured mein dikhao</span>
      </label>
      <div style={{display:"flex", gap:8}}>
        <button onClick={()=>onSave(form)} style={{flex:1, background:G.green, color:"white", border:"none", borderRadius:10, padding:12, fontWeight:700, cursor:"pointer", fontSize:14}}>💾 Save Karo</button>
        <button onClick={onCancel} style={{flex:1, background:"#eee", border:"none", borderRadius:10, padding:12, fontWeight:700, cursor:"pointer", fontSize:14}}>Cancel</button>
      </div>
    </div>
  );
}

// ── MAIN APP ──
function App() {
  const [products, setProducts] = useState(() => load("products", DEFAULT_PRODUCTS));
  const [ads, setAds]           = useState(() => load("ads", DEFAULT_ADS));
  const [cart, setCart]         = useState({});
  const [activeCat, setActiveCat] = useState("all");
  const [search, setSearch]     = useState("");
  const [view, setView]         = useState("shop");
  const [deliveryType, setDeliveryType] = useState("delivery");
  const [customerName, setCustomerName] = useState("");
  const [customerAddr, setCustomerAddr] = useState("");
  const [ordered, setOrdered]   = useState(false);
  const [showAdmin, setShowAdmin] = useState(false);
  const [adminPass, setAdminPass] = useState("");
  const [showPassPrompt, setShowPassPrompt] = useState(false);
  const [passError, setPassError] = useState("");
  const [tapCount, setTapCount]  = useState(0);

  // Reload products/ads when admin closes
  const handleAdminClose = () => {
    setProducts(load("products", DEFAULT_PRODUCTS));
    setAds(load("ads", DEFAULT_ADS));
    setShowAdmin(false);
  };

  // Secret tap on store name to open admin
  const handleLogoTap = () => {
    const n = tapCount + 1;
    setTapCount(n);
    if (n >= 5) { setTapCount(0); setShowPassPrompt(true); }
    setTimeout(() => setTapCount(0), 2000);
  };

  const checkPass = () => {
    if (adminPass === ADMIN_PASSWORD) { setShowPassPrompt(false); setAdminPass(""); setPassError(""); setShowAdmin(true); }
    else { setPassError("❌ Galat password!"); }
  };

  const allCats = [{id:"all",label:"🛒 Sab"},{id:"featured",label:"⭐ Popular"},...CATEGORIES];
  const filtered = useMemo(() => products.filter(p => {
    if (activeCat==="featured") return p.featured;
    if (activeCat!=="all" && p.cat!==activeCat) return false;
    return p.name.toLowerCase().includes(search.toLowerCase());
  }), [activeCat, search, products]);

  const cartItems  = Object.entries(cart).filter(([_,q])=>q>0);
  const totalItems = cartItems.reduce((s,[_,q])=>s+q,0);
  const subTotal   = cartItems.reduce((s,[id,q])=>{const p=products.find(x=>x.id===+id);return s+(p?p.price*q:0);},0);
  const deliveryCharge = deliveryType==="delivery" ? (subTotal>=MIN_DELIVERY?DELIVERY_CHARGE:0) : 0;
  const totalPrice = subTotal + deliveryCharge;

  const addTo    = id => setCart(c=>({...c,[id]:(c[id]||0)+1}));
  const removeFrom = id => setCart(c=>({...c,[id]:Math.max((c[id]||0)-1,0)}));

  const sendWA = () => {
    if (!cartItems.length) return;
    let msg=`🛒 *Naya Order — ${STORE_NAME}*\n📋 ${deliveryType==="delivery"?"🚚 Delivery":"🏪 Store Pickup"}\n\n`;
    if (customerName) msg+=`👤 ${customerName}\n`;
    if (deliveryType==="delivery"&&customerAddr) msg+=`📍 ${customerAddr}\n`;
    msg+=`\n📦 *Items:*\n`;
    cartItems.forEach(([id,q])=>{const p=products.find(x=>x.id===+id);if(p)msg+=`${p.emoji} ${p.name} × ${q} = ₹${p.price*q}\n`;});
    msg+=`\n💵 Subtotal: ₹${subTotal}`;
    if (deliveryCharge>0) msg+=`\n🚚 Delivery: ₹${deliveryCharge}`;
    msg+=`\n\n💰 *Kul: ₹${totalPrice}*\n\nKripya confirm karein! 🙏`;
    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`,"_blank");
    setOrdered(true);
  };

  // Products with inline ads every 5 items
  const listWithAds = [];
  filtered.forEach((p,i)=>{
    listWithAds.push({type:"product",data:p});
    if ((i+1)%5===0 && i!==filtered.length-1 && ads.length>0) {
      listWithAds.push({type:"ad",data:ads[Math.floor(i/5)%ads.length]});
    }
  });

  return (
    <div style={{fontFamily:"'Trebuchet MS',sans-serif",background:G.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",boxShadow:"0 0 40px rgba(0,0,0,0.15)"}}>

      {/* PASS PROMPT */}
      {showPassPrompt && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"white",borderRadius:16,padding:24,width:"100%",maxWidth:320}}>
            <div style={{fontWeight:700,fontSize:16,marginBottom:12,color:G.green}}>🔐 Admin Login</div>
            <input type="password" value={adminPass} onChange={e=>{setAdminPass(e.target.value);setPassError("");}} onKeyDown={e=>e.key==="Enter"&&checkPass()} placeholder="Password daalo" style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #ddd",fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
            {passError && <div style={{color:"red",fontSize:12,marginBottom:8}}>{passError}</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={checkPass} style={{flex:1,background:G.green,color:"white",border:"none",borderRadius:10,padding:11,fontWeight:700,cursor:"pointer"}}>Login</button>
              <button onClick={()=>{setShowPassPrompt(false);setAdminPass("");setPassError("");}} style={{flex:1,background:"#eee",border:"none",borderRadius:10,padding:11,fontWeight:700,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* ADMIN PANEL */}
      {showAdmin && <AdminPanel onClose={handleAdminClose}/>}

      {/* HEADER */}
      <div style={{background:`linear-gradient(135deg,${G.green},#3d6b1f)`,padding:"18px 16px 14px",position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 20px rgba(45,80,22,0.4)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div onClick={handleLogoTap} style={{cursor:"default",userSelect:"none"}}>
            <div style={{fontSize:10,color:G.light,letterSpacing:2,textTransform:"uppercase"}}>Aapka Bharosa</div>
            <div style={{color:"white",fontWeight:700,fontSize:19}}>{STORE_NAME}</div>
            <div style={{color:"#c5e88a",fontSize:11,marginTop:2}}>🕐 Subah 7 — Raat 10</div>
          </div>
          <button onClick={()=>setView(view==="cart"?"shop":"cart")} style={{background:view==="cart"?"#ff6b35":G.light,border:"none",borderRadius:10,padding:"8px 14px",cursor:"pointer",position:"relative",fontWeight:700,fontSize:13,color:view==="cart"?"white":G.green}}>
            {view==="cart"?"← Wapas":"🛒 Cart"}
            {totalItems>0&&view!=="cart"&&<span style={{background:"#ff4444",color:"white",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,position:"absolute",top:-7,right:-7}}>{totalItems}</span>}
          </button>
        </div>
        {view==="shop"&&<input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Koi cheez dhundho..." style={{marginTop:12,width:"100%",padding:"9px 14px",borderRadius:10,border:"none",fontSize:14,background:"rgba(255,255,255,0.15)",color:"white",outline:"none",boxSizing:"border-box"}}/>}
      </div>

      {/* SHOP */}
      {view==="shop"&&(
        <>
          {ads.length>0&&<AdBanner ads={ads}/>}
          <div style={{padding:"10px 16px",overflowX:"auto",display:"flex",gap:8}}>
            {allCats.map(c=>(
              <button key={c.id} onClick={()=>setActiveCat(c.id)} style={{flexShrink:0,padding:"7px 14px",borderRadius:20,border:"2px solid",borderColor:activeCat===c.id?G.green:"#e0d5c0",background:activeCat===c.id?G.green:"white",color:activeCat===c.id?"white":"#555",fontWeight:600,fontSize:12,cursor:"pointer"}}>{c.label}</button>
            ))}
          </div>
          <div style={{padding:"0 16px 130px"}}>
            <div style={{fontSize:12,color:"#999",marginBottom:8}}>{filtered.length} items</div>
            {listWithAds.map((item,i)=>{
              if(item.type==="ad"){
                const a=item.data;
                return <div key={"ad"+i} style={{borderRadius:12,overflow:"hidden",marginBottom:10,boxShadow:"0 3px 12px rgba(0,0,0,0.1)"}}>
                  <div style={{background:a.bg,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                    <div style={{fontSize:26}}>{a.emoji}</div>
                    <div style={{flex:1}}><div style={{fontSize:8,color:"rgba(255,255,255,0.65)",letterSpacing:2,textTransform:"uppercase"}}>Sponsored</div><div style={{color:"white",fontWeight:700,fontSize:13}}>{a.business}</div><div style={{color:"rgba(255,255,255,0.8)",fontSize:11}}>{a.offer}</div></div>
                    <a href={"tel:+91"+a.phone} style={{background:"rgba(255,255,255,0.25)",padding:"5px 10px",borderRadius:8,color:"white",fontSize:11,fontWeight:700,textDecoration:"none"}}>📞</a>
                  </div>
                </div>;
              }
              const p=item.data;
              return(
                <div key={p.id} style={{background:"white",borderRadius:14,padding:"13px 14px",marginBottom:9,display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 10px rgba(0,0,0,0.06)",border:cart[p.id]>0?`2px solid ${G.light}`:"2px solid transparent"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12,flex:1}}>
                    <div style={{width:48,height:48,borderRadius:12,background:"#f5f0e8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>{p.emoji}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <div style={{fontWeight:600,fontSize:14,color:"#2a2a2a"}}>{p.name}</div>
                        {p.badge&&<span style={{background:"#fff3e0",color:"#e65100",fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:20}}>{p.badge}</span>}
                      </div>
                      <div style={{fontSize:16,fontWeight:700,color:G.green,marginTop:2}}>₹{p.price}</div>
                    </div>
                  </div>
                  {cart[p.id]>0?(
                    <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                      <button onClick={()=>removeFrom(p.id)} style={{width:30,height:30,borderRadius:8,background:"#fee2e2",border:"none",cursor:"pointer",fontSize:18,color:"#cc3333",fontWeight:700}}>−</button>
                      <span style={{fontWeight:700,fontSize:16,minWidth:22,textAlign:"center"}}>{cart[p.id]}</span>
                      <button onClick={()=>addTo(p.id)} style={{width:30,height:30,borderRadius:8,background:G.green,border:"none",cursor:"pointer",fontSize:18,color:"white",fontWeight:700}}>+</button>
                    </div>
                  ):(
                    <button onClick={()=>addTo(p.id)} style={{background:G.green,color:"white",border:"none",borderRadius:10,padding:"8px 16px",cursor:"pointer",fontWeight:600,fontSize:13,flexShrink:0}}>+ Add</button>
                  )}
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* CART */}
      {view==="cart"&&(
        <div style={{padding:"16px 16px 140px"}}>
          <div style={{fontWeight:700,fontSize:18,color:G.green,marginBottom:14}}>🛒 Aapka Cart</div>
          {cartItems.length===0?(
            <div style={{textAlign:"center",padding:50,color:"#aaa"}}>
              <div style={{fontSize:52}}>🛒</div>
              <div style={{marginTop:10,fontSize:15}}>Cart khaali hai!</div>
              <button onClick={()=>setView("shop")} style={{marginTop:16,background:G.green,color:"white",border:"none",borderRadius:10,padding:"10px 22px",cursor:"pointer",fontWeight:600}}>Products Dekhein</button>
            </div>
          ):(
            <>
              <div style={{background:"white",borderRadius:14,padding:14,marginBottom:12,boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}>
                <div style={{fontWeight:600,marginBottom:10,color:"#333"}}>🚚 Delivery ya Pickup?</div>
                <div style={{display:"flex",gap:8}}>
                  {[["delivery","🚚 Delivery"],["pickup","🏪 Store Pickup"]].map(([v,l])=>(
                    <button key={v} onClick={()=>setDeliveryType(v)} style={{flex:1,padding:"9px 0",borderRadius:10,border:`2px solid ${deliveryType===v?G.green:"#e0d5c0"}`,background:deliveryType===v?G.green:"white",color:deliveryType===v?"white":"#555",fontWeight:600,fontSize:13,cursor:"pointer"}}>{l}</button>
                  ))}
                </div>
              </div>
              {cartItems.map(([id,qty])=>{const p=products.find(x=>x.id===+id);if(!p)return null;return(
                <div key={id} style={{background:"white",borderRadius:12,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                    <span style={{fontSize:24}}>{p.emoji}</span>
                    <div><div style={{fontWeight:600,fontSize:13}}>{p.name}</div><div style={{fontSize:12,color:"#888"}}>₹{p.price} × {qty}</div></div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                    <button onClick={()=>removeFrom(+id)} style={{width:26,height:26,borderRadius:6,background:"#fee2e2",border:"none",cursor:"pointer",color:"#cc3333",fontWeight:700}}>−</button>
                    <span style={{fontWeight:700,minWidth:18,textAlign:"center"}}>{qty}</span>
                    <button onClick={()=>addTo(+id)} style={{width:26,height:26,borderRadius:6,background:"#e8f5d0",border:"none",cursor:"pointer",color:G.green,fontWeight:700}}>+</button>
                    <span style={{fontWeight:700,color:G.green,minWidth:55,textAlign:"right",fontSize:14}}>₹{p.price*qty}</span>
                  </div>
                </div>
              );})}
              <div style={{background:"white",borderRadius:12,padding:14,marginTop:10}}>
                <div style={{fontWeight:600,marginBottom:10,color:"#333"}}>📋 Aapki Info</div>
                <input value={customerName} onChange={e=>setCustomerName(e.target.value)} placeholder="Naam" style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #e0d5c0",fontSize:14,boxSizing:"border-box",marginBottom:8,outline:"none"}}/>
                {deliveryType==="delivery"&&<input value={customerAddr} onChange={e=>setCustomerAddr(e.target.value)} placeholder="Ghar ka pata / mohalla" style={{width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #e0d5c0",fontSize:14,boxSizing:"border-box",outline:"none"}}/>}
              </div>
              <div style={{background:G.green,borderRadius:14,padding:16,marginTop:12,color:"white"}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span>Subtotal</span><span>₹{subTotal}</span></div>
                {deliveryType==="delivery"&&<div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span>Delivery</span><span>{deliveryCharge===0?"FREE":` ₹${deliveryCharge}`}</span></div>}
                <div style={{borderTop:"1px solid rgba(255,255,255,0.2)",marginTop:8,paddingTop:10,display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontWeight:700,fontSize:15}}>Kul Raqam</span>
                  <span style={{fontWeight:700,fontSize:22}}>₹{totalPrice}</span>
                </div>
              </div>
            </>
          )}
        </div>
      )}

      {/* BOTTOM BUTTON */}
      {cartItems.length>0&&(
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,padding:"12px 16px",background:"linear-gradient(to top,white 75%,transparent)",boxSizing:"border-box",zIndex:200}}>
          {view==="shop"?(
            <button onClick={()=>setView("cart")} style={{width:"100%",background:G.green,color:"white",border:"none",borderRadius:14,padding:15,fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px rgba(45,80,22,0.35)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>🛒 Cart Dekhein</span>
              <span style={{background:"rgba(255,255,255,0.2)",padding:"4px 12px",borderRadius:20}}>{totalItems} items • ₹{subTotal}</span>
            </button>
          ):view==="cart"&&cartItems.length>0?(
            ordered?(
              <div style={{background:"white",borderRadius:14,padding:16,boxShadow:"0 4px 20px rgba(0,0,0,0.12)"}}>
                <div style={{background:G.wa,borderRadius:10,padding:"12px 14px",textAlign:"center",fontWeight:700,fontSize:14,color:"white",marginBottom:10}}>✅ WhatsApp khul raha hai — order bhej do! 🙏</div>
                <div style={{background:"#f0f7e8",border:"2px dashed #a8d87a",borderRadius:10,padding:"12px 14px",textAlign:"center"}}>
                  <div style={{fontSize:13,fontWeight:700,color:G.green,marginBottom:4}}>📱 Hamara Number Save Karo!</div>
                  <div style={{fontSize:22,fontWeight:700,color:"#333",letterSpacing:1}}>+91 72062 67615</div>
                  <div style={{fontSize:11,color:"#666",marginTop:4}}>Subhash Kirana Store ke naam se save karo 🛒</div>
                </div>
              </div>
            ):(
              <button onClick={sendWA} style={{width:"100%",background:`linear-gradient(135deg,${G.wa},#128C7E)`,color:"white",border:"none",borderRadius:14,padding:15,fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 20px rgba(37,211,102,0.4)",display:"flex",justifyContent:"center",alignItems:"center",gap:10}}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.12 1.527 5.855L0 24l6.335-1.508A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.851 0-3.587-.5-5.089-1.373l-.361-.214-3.762.895.936-3.659-.237-.378A9.966 9.966 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
                WhatsApp pe Order — ₹{totalPrice}
              </button>
            )
          ):null}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
